# invoice-saas — host nginx reverse proxy (HTTP bootstrap).
#
# This file is installed by scripts/provision-ubuntu.sh. The provision script
# substitutes DOMAIN_PLACEHOLDER with the real domain, copies this to
# /etc/nginx/sites-available/invoice-saas.conf, symlinks it into sites-enabled/,
# and removes the default site.
#
# It is intentionally HTTP-ONLY. After nginx is serving on :80, the provision
# script runs `certbot --nginx ...` which OBTAINS the Let's Encrypt certificate
# and REWRITES THIS FILE IN PLACE to add:
#   - a `listen 443 ssl;` server block with the cert/key and modern TLS settings,
#   - an HTTP -> HTTPS redirect on :80,
#   - automatic renewal via the certbot systemd timer (no manual action needed).
#
# Routing matches the web app's own same-origin rewrite (packages/web/next.config.mjs):
#   browser hits https://DOMAIN/api/<x>  ->  nginx strips /api  ->  api container :3001/<x>
# The API registers its routes at the root (no /api prefix), so the trailing slash on
# proxy_pass is what removes the /api segment. Everything else goes to the web container.

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt HTTP-01 challenge. Must be reachable on :80 before the cert is issued.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # ---- API: strip the /api prefix and forward to the api container (:3001) ----
    # Bare /api -> /api/ so the location below handles it.
    location = /api {
        return 301 /api/;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API is Fastify JSON; no body buffering needed.
        proxy_request_buffering off;
    }

    # ---- Web app: Next.js on the web container (:3000) ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
